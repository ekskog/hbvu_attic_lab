# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gonic
  namespace: gonic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gonic
  template:
    metadata:
      labels:
        app: gonic
    spec:
      containers:
        - name: gonic
          image: sentriz/gonic:latest
          ports:
            - containerPort: 4747
          env:
            - name: GONIC_MUSIC_PATH
              value: /music
            - name: GONIC_DB_PATH
              value: /data/gonic.db
            - name: GONIC_LISTEN_ADDR
              value: 0.0.0.0:4747
            - name: GONIC_PLAYLISTS_PATH
              value: /data/playlists              
          volumeMounts:
            - name: music
              mountPath: /music
              readOnly: true
            - name: data
              mountPath: /data
      volumes:
        - name: music
          persistentVolumeClaim:
            claimName: gonic-music-pvc
        - name: data
          persistentVolumeClaim:
            claimName: gonic-data-pvc
apiVersion: v1
kind: Endpoints
metadata:
  name: mariadb-service # Must match the Service name exactly
  namespace: data
subsets:
  - addresses:
      - ip: 192.168.1.8 # The server with MariaDB
    ports:
      - port: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-service
  namespace: data
spec:
  # No selector! This tells it to use your manual Endpoints
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
  type: ClusterIP
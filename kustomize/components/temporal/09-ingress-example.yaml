apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: temporal-web-ingress
  namespace: temporal
  annotations:
    # Adjust these annotations based on your ingress controller
    # For Traefik (common in k3s):
    # traefik.ingress.kubernetes.io/router.entrypoints: web
    
    # For nginx-ingress:
    # nginx.ingress.kubernetes.io/rewrite-target: /
    
    # For cert-manager (if using TLS):
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  # Uncomment and configure if you want TLS
  # tls:
  # - hosts:
  #   - temporal.yourdomain.com
  #   secretName: temporal-tls
  rules:
  - host: temporal.yourdomain.com  # Change this to your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: temporal-web
            port:
              number: 8080
---
# Alternative: Use a LoadBalancer service type if your k3s has a load balancer
# Uncomment below and delete/comment out the ClusterIP service in 08-web-ui.yaml
